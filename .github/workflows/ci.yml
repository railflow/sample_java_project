name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: ./gradlew mergeTestReports --continue
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/test-results/combined/TEST-combined.xml

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - run: ./gradlew jar
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/
      - run: docker build -t sample-java-project:${{ github.sha }} .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: always()
    steps:
      - run: |
          echo "Deploying to staging..."
          echo "Health check..."
          echo "Deploy complete"

  report:
    name: Report to Build Butler
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-results
          path: build/test-results/combined/
      - uses: railflow/buildbutler-action@v3
        with:
          api-key: ${{ secrets.BUILDBUTLER_API_KEY }}
          test-results: 'build/test-results/combined/TEST-combined.xml'
