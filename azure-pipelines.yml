trigger:
  branches:
    include:
      - main

schedules:
  - cron: '*/10 * * * *'
    displayName: Scheduled run every 10 minutes
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Test
    displayName: Unit Tests
    jobs:
      - job: test
        displayName: Run Tests
        continueOnError: true
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - task: Cache@2
            inputs:
              key: 'gradle | "$(Agent.OS)" | **/*.gradle* | **/gradle-wrapper.properties'
              restoreKeys: |
                gradle | "$(Agent.OS)"
              path: $(HOME)/.gradle
            displayName: Cache Gradle dependencies

          - script: ./gradlew mergeTestReports --continue
            displayName: Run tests and merge reports

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: build/test-results/combined/TEST-combined.xml
              artifact: junit-results
            displayName: Upload test results

  - stage: Build
    displayName: Build JAR
    dependsOn: Test
    condition: always()
    jobs:
      - job: build
        displayName: Build JAR
        steps:
          - task: JavaToolInstaller@0
            inputs:
              versionSpec: '17'
              jdkArchitectureOption: x64
              jdkSourceOption: PreInstalled

          - task: Cache@2
            inputs:
              key: 'gradle | "$(Agent.OS)" | **/*.gradle* | **/gradle-wrapper.properties'
              restoreKeys: |
                gradle | "$(Agent.OS)"
              path: $(HOME)/.gradle
            displayName: Cache Gradle dependencies

          - script: ./gradlew jar
            displayName: Build JAR

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: build/libs
              artifact: app-jar
            displayName: Upload JAR artifact

  - stage: Docker
    displayName: Docker Build
    dependsOn: Build
    condition: always()
    jobs:
      - job: docker
        displayName: Build Docker Image
        steps:
          - task: DownloadPipelineArtifact@2
            inputs:
              artifact: app-jar
              targetPath: build/libs

          - script: docker build -t sample-java-project:$(Build.SourceVersion) .
            displayName: Build Docker image

  - stage: Deploy
    displayName: Deploy
    dependsOn: Docker
    condition: always()
    jobs:
      - job: deploy
        displayName: Deploy to Staging
        steps:
          - script: |
              echo "Deploying to staging..."
              echo "Health check..."
              echo "Deploy complete"
            displayName: Deploy
